# theme = "hex_lavender"
#theme = "base16_transparent"
theme ="curzon"    
[editor.soft-wrap]
enable = true






[keys.insert]
"C-;"="normal_mode"
"C-'"="normal_mode"
"C-[" = "normal_mode"
"C-b" = "normal_mode"  # Use Ctrl+b to switch to normal mode
"C-l"="normal_mode"
"C-s" = ":w" 
"C-q"=":q"  
"C-c"=":theme hex_lavender" 
"C-a"=":sh alacritty"   
"C-t"=":sh  kitty --detach "    # opens new terminal in curret location 
"C-n"=":config-reload"
"C-f" = ":sh kitty --detach yazi"  #open yazi in current location 
# "C-z"= ":sh firefox https://surajsays.com/"    

[keys.normal]

"C-l"=":reload"
 C-g = [":new",":insert-output lazygit",":buffer-close",":redraw"]
# "C-m"=":sh amberol &"
"C-r" = ":sh ~/.config/helix/scripts/run_project.sh "
"C-t" = ":sh kitty --detach"

[editor]
clipboard-provider = "x-clip"
